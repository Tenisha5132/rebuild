[[servers]]
name = "doc-parser"
package = "uvx::mozilla-redactor@0.1.0"
command = "doc-parser-server"
tools = ["extract_text"]

[[servers]]
name = "ner-detector"
package = "uvx::mozilla-redactor@0.1.0"
command = "ner-detector-server"
tools = ["detect_entities"]

[[servers]]
name = "redactor"
package = "uvx::mozilla-redactor@0.1.0"
command = "redactor-server"
tools = ["apply_redaction"]
